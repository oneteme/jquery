<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Main</title>

<script src="https://gridstackjs.com/node_modules/gridstack/dist/gridstack-all.js"></script>
<link href="https://gridstackjs.com/node_modules/gridstack/dist/gridstack.min.css" rel="stylesheet"/>

<body>
    <div class="grid-stack"></div>
</body>

<script type="text/javascript">

  const res = Object.entries(JSON.parse(localStorage.getItem('jquery.widgets') ?? '{}'));
  if(res.length > 0){
   document.getElementsByClassName('grid-stack')[0].innerHTML = res.map(e=>
        `<div class="grid-stack-item" gs-w="3" gs-h="3"><div class="grid-stack-item-content">
            <div class="card-header">- ${e[0]} -</div>
            <div class="card"><iframe src="${e[1]}" width="100%" height="95%" style="border:none"></iframe></div>
        </div></div>`).join('');

   let grid = GridStack.init({ handle: '.card-header' }); // drag by the header only
   addEvents(grid);
}

</script>

</html>
